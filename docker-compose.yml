services:
  app:
    build:
      context: .
    ports:
      - "8000:8000"
    env_file:
      - ./docker/laravel.env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    environment:
      MYSQL_DATABASE: concesionario
      MYSQL_USER: concesionario
      MYSQL_PASSWORD: concesionario
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db-data:
